name: InvoiceFlow CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-and-eval:
    name: Backend tests and eval thresholds
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend modules
        run: |
          python -m compileall api app tests

      - name: Run backend tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: Run eval threshold gate
        run: |
          python -m app.eval.check_eval_thresholds --output eval-results.json

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: invoiceflow-eval-results
          path: eval-results.json
